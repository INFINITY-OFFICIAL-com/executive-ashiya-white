<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>取材のご依頼 | EXECUTIVE ASHIYA Press Kit</title>
  <meta name="robots" content="noindex, nofollow" />
  <meta name="description" content="EXECUTIVE ASHIYA への取材・メディア掲載に関するお問い合わせフォーム" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Noto+Serif+JP:wght@200;300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #FFFFFF;
      --gold: #8B6F1F;
      --gold-light: #B89134;
      --gold-dark: #6A521A;
      --gold-soft: rgba(139, 111, 31, 0.16);
      --ink: #1C1F2E;
      --ink-soft: rgba(28, 31, 46, 0.7);
      --ink-faint: rgba(28, 31, 46, 0.35);
      --ink-line: rgba(28, 31, 46, 0.13);
      --field-bg: #FFFFFF;
      --field-border: rgba(28, 31, 46, 0.18);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Noto Serif JP', serif;
      font-weight: 300;
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    .header {
      padding: 3rem 2rem 2rem;
      text-align: center;
      border-bottom: 1px solid var(--ink-line);
      position: relative;
    }
    .header::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 1px;
      background: var(--gold);
    }
    .header-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1rem, 2.5vw, 1.4rem);
      letter-spacing: 0.5em;
      color: var(--gold);
      margin-bottom: 0.4rem;
      text-decoration: none;
      display: block;
    }
    .header-logo:hover { opacity: 0.7; }
    .header-sub {
      font-size: 0.55rem;
      letter-spacing: 0.35em;
      color: var(--ink-soft);
    }

    .content {
      max-width: 640px;
      margin: 0 auto;
      padding: 5rem 2rem 6rem;
    }

    .page-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.65rem;
      letter-spacing: 0.4em;
      color: var(--gold);
      margin-bottom: 3rem;
      text-align: center;
    }
    .page-title::before,
    .page-title::after {
      content: '—';
      margin: 0 1rem;
      color: var(--gold-dark);
    }

    .intro-text {
      font-size: 0.92rem;
      line-height: 2.4;
      color: var(--ink-soft);
      text-align: center;
      margin-bottom: 4.5rem;
      letter-spacing: 0.05em;
    }

    .form-group {
      margin-bottom: 3rem;
      position: relative;
      animation: fadeUp 0.6s ease both;
    }
    .form-group:nth-child(1) { animation-delay: 0.1s; }
    .form-group:nth-child(2) { animation-delay: 0.15s; }
    .form-group:nth-child(3) { animation-delay: 0.2s; }
    .form-group:nth-child(4) { animation-delay: 0.25s; }
    .form-group:nth-child(5) { animation-delay: 0.3s; }
    .form-group:nth-child(6) { animation-delay: 0.35s; }

    .form-number {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.55rem;
      letter-spacing: 0.3em;
      color: var(--gold-dark);
      margin-bottom: 0.6rem;
    }
    .form-label {
      display: block;
      font-size: 0.88rem;
      letter-spacing: 0.15em;
      color: var(--ink);
      margin-bottom: 0.8rem;
    }
    .required {
      font-size: 0.5rem;
      color: var(--gold);
      letter-spacing: 0.1em;
      margin-left: 0.5rem;
      vertical-align: middle;
    }

    .form-input,
    .form-textarea {
      width: 100%;
      background: var(--field-bg);
      border: 1px solid var(--field-border);
      border-bottom: 1px solid var(--gold-dark);
      color: var(--ink);
      font-family: 'Noto Serif JP', serif;
      font-size: 0.92rem;
      font-weight: 300;
      padding: 1rem 1.1rem;
      outline: none;
      transition: all 0.3s;
      letter-spacing: 0.05em;
      -webkit-appearance: none;
    }
    .form-input:focus,
    .form-textarea:focus {
      border-color: var(--gold);
      background: #FFFFFF;
    }
    .form-input::placeholder,
    .form-textarea::placeholder {
      color: var(--ink-faint);
      font-size: 0.8rem;
    }
    .form-textarea {
      resize: vertical;
      min-height: 160px;
      line-height: 1.9;
    }

    /* Radio buttons */
    .radio-group {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }
    .radio-item {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      cursor: pointer;
    }
    .radio-item input[type="radio"] {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border: 1px solid var(--field-border);
      border-radius: 50%;
      cursor: pointer;
      position: relative;
      flex-shrink: 0;
    }
    .radio-item input[type="radio"]:checked {
      border-color: var(--gold);
    }
    .radio-item input[type="radio"]:checked::after {
      content: '';
      position: absolute;
      top: 3px;
      left: 3px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--gold);
    }
    .radio-item span {
      font-size: 0.92rem;
      letter-spacing: 0.06em;
      color: var(--ink);
    }

    .submit-wrap {
      text-align: center;
      margin-top: 4rem;
      padding-top: 3rem;
      border-top: 1px solid var(--ink-line);
      position: relative;
    }
    .submit-wrap::before {
      content: '';
      position: absolute;
      top: -1px;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 1px;
      background: var(--gold);
    }
    .submit-note {
      font-size: 0.78rem;
      color: var(--ink-soft);
      letter-spacing: 0.1em;
      line-height: 2;
      margin-bottom: 2.5rem;
    }
    .submit-note a {
      color: var(--gold);
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .submit-note a:hover { opacity: 0.7; }

    .submit-btn {
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--gold);
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.88rem;
      letter-spacing: 0.45em;
      padding: 1.3rem 4.5rem;
      cursor: pointer;
      transition: all 0.4s;
      position: relative;
      overflow: hidden;
    }
    .submit-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--gold);
      transform: translateX(-100%);
      transition: transform 0.4s;
    }
    .submit-btn:hover::before { transform: translateX(0); }
    .submit-btn span {
      position: relative;
      z-index: 1;
      transition: color 0.4s;
    }
    .submit-btn:hover span { color: var(--bg); }
    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .submit-btn:disabled::before { display: none; }

    .form-error {
      display: none;
      text-align: center;
      padding: 1.2rem 1.5rem;
      margin-top: 1.5rem;
      background: rgba(160, 58, 58, 0.06);
      border: 1px solid rgba(160, 58, 58, 0.2);
      font-size: 0.65rem;
      color: #8B3A3A;
      letter-spacing: 0.08em;
      line-height: 1.8;
    }

    .back-link {
      display: block;
      text-align: center;
      padding: 1.5rem 2rem 0;
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      color: var(--gold);
      text-decoration: none;
      transition: opacity 0.3s;
    }
    .back-link:hover { opacity: 0.6; }

    .footer {
      text-align: center;
      padding: 2rem;
      border-top: 1px solid var(--ink-line);
    }
    .footer-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.55rem;
      letter-spacing: 0.3em;
      color: var(--gold-dark);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .visually-hidden {
      position: absolute !important;
      width: 1px !important; height: 1px !important;
      padding: 0 !important; margin: -1px !important;
      overflow: hidden !important; clip: rect(0,0,0,0) !important;
      white-space: nowrap !important; border: 0 !important;
    }

    @media (max-width: 600px) {
      .content { padding: 3.5rem 1.5rem 4rem; }
      .submit-btn {
        padding: 1.1rem 2.5rem;
        letter-spacing: 0.3em;
        font-size: 0.7rem;
      }
    }
  </style>
</head>
<body>

  <header class="header">
    <a href="/" class="header-logo">EXECUTIVE ASHIYA</a>
    <div class="header-sub">MEDIA INQUIRY</div>
  </header>

  <div class="content">

    <div class="page-title">取材のご依頼</div>

    <p class="intro-text">
      EXECUTIVE ASHIYAへの取材・メディア掲載に関するお問い合わせは、<br>
      以下のフォームよりお送りください。<br>
      担当者より折り返しご連絡差し上げます。
    </p>

    <form name="press-inquiry" method="POST" action="/press-kit/thanks.html"
          data-netlify="true" netlify-honeypot="bot-field" id="press-form">
      <input type="hidden" name="form-name" value="press-inquiry" />
      <p class="visually-hidden"><label>Do not fill: <input name="bot-field" /></label></p>
      <input type="hidden" name="form-loaded-at" id="form-loaded-at" />

      <!-- 01: お問い合わせ種別 -->
      <div class="form-group">
        <div class="form-number">01</div>
        <label class="form-label">お問い合わせ種別<span class="required">必須</span></label>
        <div class="radio-group">
          <label class="radio-item">
            <input type="radio" name="お問い合わせ種別" value="取材・インタビュー" required />
            <span>取材・インタビュー</span>
          </label>
          <label class="radio-item">
            <input type="radio" name="お問い合わせ種別" value="メディア掲載" />
            <span>メディア掲載</span>
          </label>
          <label class="radio-item">
            <input type="radio" name="お問い合わせ種別" value="撮影・ロケ" />
            <span>撮影・ロケ</span>
          </label>
          <label class="radio-item">
            <input type="radio" name="お問い合わせ種別" value="その他" />
            <span>その他</span>
          </label>
        </div>
      </div>

      <!-- 02: 会社名・媒体名 -->
      <div class="form-group">
        <div class="form-number">02</div>
        <label class="form-label" for="field-company">会社名・媒体名</label>
        <input type="text" id="field-company" name="会社名・媒体名" class="form-input" placeholder="例）株式会社○○ / ○○新聞" />
      </div>

      <!-- 03: お名前 -->
      <div class="form-group">
        <div class="form-number">03</div>
        <label class="form-label" for="field-name">お名前<span class="required">必須</span></label>
        <input type="text" id="field-name" name="お名前" class="form-input" placeholder="山田 太郎" required />
      </div>

      <!-- 04: メールアドレス -->
      <div class="form-group">
        <div class="form-number">04</div>
        <label class="form-label" for="field-email">メールアドレス<span class="required">必須</span></label>
        <input type="email" id="field-email" name="メールアドレス" class="form-input" placeholder="your@email.com" required />
      </div>

      <!-- 05: 電話番号 -->
      <div class="form-group">
        <div class="form-number">05</div>
        <label class="form-label" for="field-phone">電話番号</label>
        <input type="tel" id="field-phone" name="電話番号" class="form-input" placeholder="090-1234-5678" />
      </div>

      <!-- 06: お問い合わせ内容 -->
      <div class="form-group">
        <div class="form-number">06</div>
        <label class="form-label" for="field-message">お問い合わせ内容<span class="required">必須</span></label>
        <textarea id="field-message" name="お問い合わせ内容" class="form-textarea"
          placeholder="取材の趣旨・掲載媒体・ご希望の日程などをお書きください"
          required></textarea>
      </div>

      <!-- SUBMIT -->
      <div class="submit-wrap">
        <p class="submit-note">
          ご記入いただいた情報は、取材対応に関するご連絡のみに使用いたします。<br>
          <a href="/privacy.html">プライバシーポリシー</a>
        </p>
        <button type="submit" class="submit-btn" id="submit-btn">
          <span>送信する</span>
        </button>
        <div class="form-error" id="form-error">
          送信に失敗しました。時間をおいて再度お試しください。
        </div>
      </div>

    </form>

  </div>

  <a href="/press-kit" class="back-link">&larr; BACK TO PRESS KIT</a>

  <footer class="footer">
    <div class="footer-text">&copy; 2026 EXECUTIVE ASHIYA / ReFit Inc. All Rights Reserved.</div>
  </footer>

<script>
  document.getElementById('form-loaded-at').value = Date.now().toString();

  var form = document.getElementById('press-form');
  var submitBtn = document.getElementById('submit-btn');
  var isSubmitting = false;

  form.addEventListener('submit', function(e) {
    if (isSubmitting) {
      e.preventDefault();
      return;
    }
    isSubmitting = true;
    submitBtn.disabled = true;
    submitBtn.querySelector('span').textContent = '送信中…';
  });
</script>

</body>
</html>
