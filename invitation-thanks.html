<!DOCTYPE html>
<html lang="ja" dir="ltr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>送信完了 | EXECUTIVE ASHIYA</title>
    <link rel="icon" href="/favicon.ico" sizes="48x48">
    <link rel="icon" href="/favicon-192.png" type="image/png" sizes="192x192">
    <link rel="icon" href="/favicon-512.png" type="image/png" sizes="512x512">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/favicon-192.png">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="EXECUTIVE ASHIYA（エグゼクティブ芦屋）">
    <meta property="og:title" content="送信完了 | EXECUTIVE ASHIYA">
    <meta property="og:locale" content="ja_JP">
    <meta property="og:url" content="https://executive-ashiya.com/invitation-thanks">
    <meta property="og:image" content="https://executive-ashiya.com/ogp-v2.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="送信完了 | EXECUTIVE ASHIYA">
    <meta name="twitter:image" content="https://executive-ashiya.com/ogp-v2.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Noto+Serif+JP:wght@200;300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --dark-green: #1e392b;
            --cream: #fbf9f3;
            --text-brown: rgb(88, 80, 60);
            --green-accent: rgb(43, 82, 62);
            --line-color: rgba(88, 80, 60, 0.12);
        }
        html { -webkit-font-smoothing: antialiased; }
        body {
            font-family: 'Noto Serif JP', '游明朝', serif;
            background: var(--cream);
            color: var(--text-brown);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .page-header {
            padding: 2.5rem 2rem 2rem;
            text-align: center;
            border-bottom: 1px solid var(--line-color);
            position: relative;
        }
        .page-header::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 1px;
            background: var(--green-accent);
        }
        .header-logo {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-weight: 400;
            font-size: clamp(1rem, 2.5vw, 1.3rem);
            letter-spacing: 0.3em;
            color: var(--text-brown);
            text-decoration: none;
        }
        .header-logo:hover { opacity: 0.7; }
        .content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 80px 24px;
            text-align: center;
        }
        .thanks-inner { max-width: 520px; }
        .thanks-label {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 0.65rem;
            letter-spacing: 0.3em;
            color: var(--green-accent);
            margin-bottom: 2rem;
            text-transform: uppercase;
        }
        .thanks-heading {
            font-weight: 300;
            font-size: clamp(1.4rem, 4vw, 2rem);
            letter-spacing: 0.08em;
            line-height: 1.6;
            margin-bottom: 2rem;
        }
        .thanks-body {
            font-size: 0.92rem;
            line-height: 2.2;
            color: var(--text-brown);
            opacity: 0.7;
            margin-bottom: 3rem;
        }
        .back-btn {
            display: inline-block;
            font-family: 'Noto Serif JP', '游明朝', serif;
            font-size: 0.8rem;
            letter-spacing: 0.15em;
            color: var(--green-accent);
            border: 1px solid var(--green-accent);
            padding: 1rem 3rem;
            text-decoration: none;
            transition: all 0.3s;
        }
        .back-btn:hover {
            background: var(--green-accent);
            color: var(--cream);
            opacity: 1;
        }
        .page-footer {
            background: var(--dark-green);
            text-align: center;
            padding: 2.5rem 2rem;
        }
        .page-footer p {
            font-size: 0.7rem;
            color: rgba(251, 249, 243, 0.5);
            letter-spacing: 0.06em;
        }
    </style>
</head>
<body>
    <header class="page-header">
        <a href="./" class="header-logo">EXECUTIVE ASHIYA</a>
    </header>
    <main class="content">
        <div class="thanks-inner">
            <p class="thanks-label">Thank You</p>
            <h1 class="thanks-heading">ご登録ありがとうございます</h1>
            <p class="thanks-body">
                ウェイティングリストへのご登録を承りました。<br>
                担当より2営業日以内にご連絡いたします。<br>
                しばらくお待ちくださいませ。
            </p>
            <a href="./" class="back-btn">トップページへ戻る</a>
        </div>
    </main>
    <footer class="page-footer">
        <p>&copy; 2026 EXECUTIVE ASHIYA. All rights reserved.</p>
    </footer>
    <script>
    (function() {
        try {
            var lang = localStorage.getItem('ea_lang');
            if (lang === 'en') {
                document.documentElement.lang = 'en';
                document.title = 'Submission Complete | EXECUTIVE ASHIYA';
                document.querySelector('.thanks-heading').textContent = 'Thank you for registering';
                document.querySelector('.thanks-body').innerHTML = 'Your waiting list registration has been received.<br>A representative will contact you within 2 business days.<br>Please wait for our response.';
                document.querySelector('.back-btn').textContent = 'Back to Top Page';
            }
        } catch(e) {}
    })();
    </script>
</body>
</html>
