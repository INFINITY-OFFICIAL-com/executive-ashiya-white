<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FAF8F4"/>
      <stop offset="100%" stop-color="#F2EEE6"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B89134"/>
      <stop offset="50%" stop-color="#8B6F1F"/>
      <stop offset="100%" stop-color="#6A521A"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B6F1F" stop-opacity="0"/>
      <stop offset="50%" stop-color="#8B6F1F" stop-opacity="1"/>
      <stop offset="100%" stop-color="#8B6F1F" stop-opacity="0"/>
    </linearGradient>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix values="0 0 0 0 0.11 0 0 0 0 0.12 0 0 0 0 0.18 0 0 0 0.025 0"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" filter="url(#noise)"/>

  <!-- Top decoration line -->
  <rect x="500" y="120" width="200" height="1" fill="url(#lineGrad)"/>

  <!-- Emblem (rhombus) -->
  <g transform="translate(600, 200)" opacity="0.7">
    <path d="M0 -45 L45 0 L0 45 L-45 0 Z" fill="none" stroke="url(#goldGrad)" stroke-width="0.8"/>
    <path d="M0 -25 L25 0 L0 25 L-25 0 Z" fill="none" stroke="url(#goldGrad)" stroke-width="0.6"/>
    <line x1="0" y1="-50" x2="0" y2="50" stroke="#8B6F1F" stroke-width="0.4" opacity="0.45"/>
    <line x1="-50" y1="0" x2="50" y2="0" stroke="#8B6F1F" stroke-width="0.4" opacity="0.45"/>
  </g>

  <!-- Brand name -->
  <text x="600" y="320" font-family="'Cormorant Garamond', Georgia, serif" font-size="72" font-weight="300" fill="#1C1F2E" text-anchor="middle" letter-spacing="14">
    EXECUTIVE ASHIYA
  </text>

  <!-- Japanese subtitle -->
  <text x="600" y="365" font-family="'Noto Serif JP', 'Yu Mincho', serif" font-size="20" font-weight="200" fill="#1C1F2E" fill-opacity="0.55" text-anchor="middle" letter-spacing="12">
    エ グ ゼ ク テ ィ ブ 芦 屋
  </text>

  <!-- Divider line -->
  <rect x="500" y="410" width="200" height="1" fill="url(#lineGrad)"/>

  <!-- Catchphrase -->
  <text x="600" y="465" font-family="'Noto Serif JP', 'Yu Mincho', serif" font-size="32" font-weight="300" fill="#1C1F2E" fill-opacity="0.85" text-anchor="middle" letter-spacing="6">
    健康寿命を、生涯最大の資産に。
  </text>

  <!-- By Invitation Only -->
  <text x="600" y="525" font-family="'Cormorant Garamond', Georgia, serif" font-size="18" font-weight="300" fill="#8B6F1F" fill-opacity="0.85" text-anchor="middle" letter-spacing="8" font-style="italic">
    — By Invitation Only —
  </text>

  <!-- Bottom tagline -->
  <text x="600" y="580" font-family="'Cormorant Garamond', Georgia, serif" font-size="14" font-weight="300" fill="#1C1F2E" fill-opacity="0.4" text-anchor="middle" letter-spacing="6">
    YOUR PRIVATE HEALTH CONCIERGE
  </text>

  <!-- Corner decoration -->
  <g stroke="#8B6F1F" stroke-width="0.5" fill="none" opacity="0.5">
    <line x1="60" y1="60" x2="100" y2="60"/>
    <line x1="60" y1="60" x2="60" y2="100"/>
    <line x1="1140" y1="60" x2="1100" y2="60"/>
    <line x1="1140" y1="60" x2="1140" y2="100"/>
    <line x1="60" y1="570" x2="100" y2="570"/>
    <line x1="60" y1="570" x2="60" y2="530"/>
    <line x1="1140" y1="570" x2="1100" y2="570"/>
    <line x1="1140" y1="570" x2="1140" y2="530"/>
  </g>
</svg>
